# Example reverse proxy for homepage (Go app on 127.0.0.1:8080).
# Install: copy to /etc/nginx/sites-available/, adjust server_name, then:
#   sudo ln -s /etc/nginx/sites-available/nginx-homepage.example.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: use certbot (python3-certbot-nginx) or your own certs and add a
# second server { listen 443 ssl; ... } block with the same location.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name dashboard.example.com;

    # Optional: limit upload size if you add larger API payloads later
    # client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
